server.port=8080
spring.application.name=fynex

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/finance_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=finance_user
spring.datasource.password=finance123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# OAuth2
spring.security.oauth2.authorizationserver.client.registration.fynex-client.provider=spring
spring.security.oauth2.authorizationserver.client.registration.fynex-client.client-id=fynex-app
spring.security.oauth2.authorizationserver.client.registration.fynex-client.client-secret={noop}secret
spring.security.oauth2.authorizationserver.client.registration.fynex-client.client-authentication-methods=client_secret_basic
spring.security.oauth2.authorizationserver.client.registration.fynex-client.authorization-grant-types=authorization_code,refresh_token,client_credentials
spring.security.oauth2.authorizationserver.client.registration.fynex-client.redirect-uris=http://localhost:8080/login/oauth2/code/fynex
spring.security.oauth2.authorizationserver.client.registration.fynex-client.scope=openid,profile,read,write
spring.security.oauth2.authorizationserver.client.registration.fynex-client.require-authorization-consent=false

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger / SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.packages-to-scan=org.example.app.controller
