version: "3.9"
services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: fynex_app
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/finance_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: finance_user
      SPRING_DATASOURCE_PASSWORD: finance123
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - finance_net

  db:
    image: mysql:8.0
    container_name: fynex_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: finance_db
      MYSQL_USER: finance_user
      MYSQL_PASSWORD: finance123
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finance_net

  adminer:
    image: adminer:latest
    container_name: fynex_adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:8080"
    networks:
      - finance_net

volumes:
  mysql_data:

networks:
  finance_net:
    driver: bridge
